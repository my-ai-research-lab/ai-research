<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{TITLE}}</title>
<style>
{{CSS}}
</style>
</head>
<body>
<div class="page">

  <!-- Page Header -->
  <div class="page-header">
    <h1>技能 <span class="accent">评测报告</span></h1>
    <div class="subtitle">Skill Dojo · Benchmark Run</div>
    <div class="meta">{{TIMESTAMP}} | {{MODE}}</div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card highlight">
      <div class="value c-blue">{{PASS_RATE}}</div>
      <div class="label">通过率</div>
    </div>
    <div class="stat-card">
      <div class="value c-green">{{PASSED}}</div>
      <div class="label">通过</div>
    </div>
    <div class="stat-card">
      <div class="value c-red">{{FAILED}}</div>
      <div class="label">失败</div>
    </div>
    <div class="stat-card">
      <div class="value c-yellow">{{ERRORS}}</div>
      <div class="label">错误</div>
    </div>
    <div class="stat-card">
      <div class="value">{{TOTAL}}</div>
      <div class="label">总计</div>
    </div>
  </div>

  <!-- Skill Chips Overview -->
  <div class="section">
    <div class="section-title">本次评测技能 ({{TOTAL}} 项)</div>
    <div class="skill-chips">
      {{SKILL_CHIPS}}
    </div>
  </div>

  <!-- Results Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:40px;text-align:center">#</th>
          <th style="width:50px;text-align:center">状态</th>
          <th style="width:160px">技能</th>
          <th style="width:160px">功能描述</th>
          <th style="width:220px">评测项</th>
          <th style="min-width:180px">交付物 & 会话</th>
          <th style="width:60px;text-align:right">耗时</th>
        </tr>
      </thead>
      <tbody>
        {{TABLE_ROWS}}
      </tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="page-footer">
    Generated by Skill Dojo v{{VERSION}} · {{GENERATED_AT}}
  </div>

</div>

<script>
// 评测项折叠切换
function toggleAssertions(id) {
  const el = document.getElementById('assertions-' + id);
  el.classList.toggle('open');
  const btn = el.previousElementSibling.querySelector('.pill-toggle');
  if (btn) btn.textContent = el.classList.contains('open') ? '▲ 收起' : '▼ 展开';
}

// 技能芯片跳转
function jumpToRow(id) {
  const row = document.getElementById('row-' + id);
  if (row) row.scrollIntoView({behavior: 'smooth', block: 'center'});
}
</script>
</body>
</html>
